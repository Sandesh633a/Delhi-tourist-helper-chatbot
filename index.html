<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delhi Tourist Helper — Your AI Guide to the Heart of India</title>
    <meta name="description" content="Explore Delhi like never before. Get personalised tour plans, hotel recommendations, food guides, and local insights powered by our AI chatbot — available 24/7." />
    <meta name="keywords" content="Delhi tourism, Delhi travel guide, Delhi tourist places, Delhi food guide, Delhi hotels, AI travel assistant, Dialogflow chatbot" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Dialogflow Messenger -->
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <df-messenger
      intent="WELCOME"
      chat-title="✨ AI Travel Guide"
      agent-id="55976bc3-e65c-42fd-a14a-e3649e5575ea"
      language-code="en"
    ></df-messenger>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Next-Level Chatbot Styling Script -->
    <script>
      window.addEventListener('df-messenger-loaded', function () {
        const dfMessenger = document.querySelector('df-messenger');
        if (!dfMessenger || !dfMessenger.shadowRoot) return;

        // Apply styles to main wrapper (chat popup window)
        const chat = dfMessenger.shadowRoot.querySelector('df-messenger-chat');
        if (chat && chat.shadowRoot) {
          const chatStyle = document.createElement('style');
          chatStyle.innerHTML = `
            .chat-wrapper {
              border-radius: 24px !important;
              overflow: hidden !important;
              box-shadow: 0 32px 64px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 180, 216, 0.25) !important;
              bottom: 24px !important;
              right: 24px !important;
              animation: floatIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
              transform-origin: bottom right;
            }
            @keyframes floatIn {
              0% { opacity: 0; transform: scale(0.9) translateY(20px); }
              100% { opacity: 1; transform: scale(1) translateY(0); }
            }
          `;
          chat.shadowRoot.appendChild(chatStyle);

          // Apply styles to Titlebar
          const titlebar = chat.shadowRoot.querySelector('df-messenger-titlebar');
          if (titlebar && titlebar.shadowRoot) {
            const titleStyle = document.createElement('style');
            titleStyle.innerHTML = `
              .titlebar-wrapper {
                background: linear-gradient(135deg, rgba(3,4,94,0.95), rgba(0,119,182,0.95)) !important;
                backdrop-filter: blur(12px) !important;
                border-bottom: 1px solid rgba(0, 180, 216, 0.2) !important;
                padding: 1rem 1.25rem !important;
              }
              .title {
                font-family: 'Playfair Display', serif !important;
                font-size: 1.2rem !important;
                letter-spacing: 0.5px !important;
                color: #caf0f8 !important;
                font-weight: 700 !important;
              }
            `;
            titlebar.shadowRoot.appendChild(titleStyle);
          }

          // Apply styles to Message List (Background)
          const messageList = chat.shadowRoot.querySelector('df-message-list');
          if (messageList && messageList.shadowRoot) {
            const listStyle = document.createElement('style');
            listStyle.innerHTML = `
              .message-list-wrapper {
                background: linear-gradient(180deg, #020320 0%, #030430 100%) !important;
                scrollbar-width: thin;
                scrollbar-color: rgba(0,180,216,0.3) transparent;
              }
              .message-list-wrapper::-webkit-scrollbar { width: 6px; }
              .message-list-wrapper::-webkit-scrollbar-thumb { background: rgba(0,180,216,0.3); border-radius: 4px; }
              #messageList { padding: 16px !important; }
              .message { animation: messagePop 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards !important; }
              @keyframes messagePop {
                0% { opacity: 0; transform: translateY(10px) scale(0.98); }
                100% { opacity: 1; transform: translateY(0) scale(1); }
              }
            `;
            messageList.shadowRoot.appendChild(listStyle);
          }

          // Apply styles to User Input
          const userInput = chat.shadowRoot.querySelector('df-messenger-user-input');
          if (userInput && userInput.shadowRoot) {
            const inputStyle = document.createElement('style');
            inputStyle.innerHTML = `
              .input-container {
                background: rgba(2,3,40,0.95) !important;
                border-top: 1px solid rgba(0, 180, 216, 0.2) !important;
                padding: 10px 16px !important;
              }
              input {
                font-family: 'Inter', sans-serif !important;
                font-size: 0.95rem !important;
                color: #e8f4fd !important;
              }
              input::placeholder { color: rgba(144, 224, 239, 0.4) !important; }
            `;
            userInput.shadowRoot.appendChild(inputStyle);
          }
        }
      });
    </script>
  </body>
</html>
